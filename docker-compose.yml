services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./devops/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: devops/docker/backend/Dockerfile.backend.dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: "3000"
      CI: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: devops/docker/frontend/Dockerfile.frontend.dev
    env_file:
      - .env
    environment:
      VITE_APP_ENV: ${VITE_APP_ENV}
      VITE_FRONTEND_URL: ${VITE_FRONTEND_URL}
      VITE_FRONTEND_API_URL: ${VITE_FRONTEND_API_URL}
      CI: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: devops/docker/nginx/Dockerfile.nginx.dev
    ports:
      - "8088:80"
    volumes:
      - ./devops/docker/nginx/${NGINX_CONF}:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
