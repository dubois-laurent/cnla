# Use Trivy for scanning images : 0.70.0

test:unit:
  stage: test
  extends: .node-job
  script:
    - echo "=== Installation des dépendances backend ==="
    - cd backend
    - pnpm install
    - echo "=== Lancement des tests unitaires ==="
    - node --test test/unit/app.test.js test/unit/connection-string.test.js
    - echo "=== Tests unitaires terminés ==="

test:integration:
  stage: test
  extends: .docker-job
  script:
    - echo "=== Démarrage des services db et backend ==="
    - docker compose up -d db backend
    - echo "=== Attente que le backend soit prêt ==="
    - docker run --rm --network cnla_default node:22-alpine
        sh -c 'until wget -qO- http://backend:3000/ >/dev/null 2>&1; do sleep 2; done'
    - echo "=== Backend prêt — lancement des tests d'intégration ==="
    - docker run --rm
        --network cnla_default
        -v "$PWD/backend:/app"
        -w /app
        -e API_URL=http://backend:3000
        node:22-alpine
        node --test test/integration/api.integration.test.js
    - echo "=== Tests d'intégration terminés ==="

test:e2e:
  stage: test
  extends: .docker-job
  script:
    - echo "=== Démarrage de la stack complète ==="
    - docker compose up -d
    - echo "=== Attente que nginx soit prêt ==="
    - docker run --rm --network cnla_default node:22-alpine
        sh -c 'until wget -qO- http://nginx/ >/dev/null 2>&1; do sleep 2; done'
    - echo "=== Nginx prêt — lancement des tests E2E ==="
    - docker run --rm
        --network cnla_default
        -v "$PWD/backend:/app"
        -w /app
        -e E2E_BASE_URL=http://nginx
        node:22-alpine
        node --test test/e2e/nginx.e2e.test.js
    - echo "=== Tests E2E terminés ==="

