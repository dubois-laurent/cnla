variables:
  COMPOSE_PROJECT_NAME: projet_cnla
  TRIVY_VERSION: "0.70.0"
  COMPOSE_PUBLISH_HOST: docker

test:unit:
  stage: test
  extends: .node-job
  coverage: '/Lines\s*:\s*([\d.]+)%/'
  script:
    - cd backend && pnpm install --frozen-lockfile
    - mkdir -p ../reports
    - >
      pnpm exec c8 --reporter=lcov --reporter=cobertura --reporter=text-summary
      node --test --test-reporter=junit --test-reporter-destination=../reports/junit.xml
      test/unit/*.test.js
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/junit.xml
      - backend/coverage/
    reports:
      junit: reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage/cobertura-coverage.xml

test:integration:
  stage: test
  extends: .docker-job
  needs: ["lint:compose"]
  script:
    - docker compose -f docker-compose.yml build db backend
    - docker compose -f docker-compose.yml up -d db backend
    - chmod +x devops/ci/scripts/wait-for-url.sh
    - devops/ci/scripts/wait-for-url.sh "http://${COMPOSE_PUBLISH_HOST}:3000/"
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/work" \
        -w /work/backend \
        --network "${COMPOSE_PROJECT_NAME}_default" \
        -e API_URL=http://backend:3000 \
        node:22-alpine \
        sh -ec 'corepack enable && corepack prepare pnpm@9 --activate && pnpm install --frozen-lockfile && mkdir -p ../reports && node --test --test-reporter=junit --test-reporter-destination=../reports/junit-integration.xml test/integration/*.test.js'
    - docker compose -f docker-compose.yml down -v
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/junit-integration.xml
    reports:
      junit: reports/junit-integration.xml

test:e2e:
  stage: test
  extends: .docker-job
  needs: ["lint:compose"]
  script:
    - docker compose -f docker-compose.yml build
    - docker compose -f docker-compose.yml up -d
    - chmod +x devops/ci/scripts/wait-for-url.sh
    - devops/ci/scripts/wait-for-url.sh "http://${COMPOSE_PUBLISH_HOST}:8088/"
    - devops/ci/scripts/wait-for-url.sh "http://${COMPOSE_PUBLISH_HOST}:8088/api/v1/users"
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/work" \
        -w /work/backend \
        --network "${COMPOSE_PROJECT_NAME}_default" \
        -e E2E_BASE_URL=http://nginx:80 \
        node:22-alpine \
        sh -ec 'corepack enable && corepack prepare pnpm@9 --activate && pnpm install --frozen-lockfile && mkdir -p ../reports && node --test --test-reporter=spec --test-reporter=junit --test-reporter-destination=- --test-reporter-destination=../reports/junit-e2e.xml test/e2e/nginx.e2e.test.js'
    - docker compose -f docker-compose.yml down -v
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/junit-e2e.xml
    reports:
      junit: reports/junit-e2e.xml

test:images:
  stage: test
  extends: .docker-job
  needs:
    - test:unit
    - test:integration
    - test:e2e
  before_script:
    - echo "Branch $CI_COMMIT_REF_NAME · commit $CI_COMMIT_SHORT_SHA · pipeline $CI_PIPELINE_ID"
    - echo "Waiting for Docker daemon..."
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - docker version
    - apk add --no-cache gettext curl
    - envsubst < .env.example > .env
    - echo ".env ready."
    - >
      curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
      -o /tmp/trivy.tgz &&
      tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy &&
      rm -f /tmp/trivy.tgz
    - trivy --version
  script:
    - docker compose -f docker-compose.yml build backend frontend nginx
    - |
      for service in backend frontend nginx; do
        image="${COMPOSE_PROJECT_NAME}-${service}"
        echo "=== Trivy ${image} ==="
        trivy image --exit-code 0 --severity HIGH,CRITICAL "${image}"
        docker tag "${image}" "${CI_REGISTRY_IMAGE}/${service}:${CI_COMMIT_SHORT_SHA}"
        docker tag "${image}" "${CI_REGISTRY_IMAGE}/${service}:${CI_COMMIT_REF_SLUG}"
        echo "Tagged ${CI_REGISTRY_IMAGE}/${service}:${CI_COMMIT_SHORT_SHA}"
        echo "Tagged ${CI_REGISTRY_IMAGE}/${service}:${CI_COMMIT_REF_SLUG}"
      done
