.feature-branch-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^feature\/.*/

.docker-job:
  image: docker:26-cli
  services:
    - name: docker:26-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  extends: .feature-branch-rules
  before_script:
    - echo "Branch $CI_COMMIT_REF_NAME · commit $CI_COMMIT_SHORT_SHA · pipeline $CI_PIPELINE_ID"
    - echo "Waiting for Docker daemon..."
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - docker version
    - apk add --no-cache gettext curl
    - envsubst < .env.example > .env
    - echo ".env ready."

.node-job:
  image: node:22-alpine
  extends: .feature-branch-rules
  before_script:
    - corepack enable && corepack prepare pnpm@9 --activate

lint:compose:
  stage: lint
  extends: .docker-job
  allow_failure: false
  script:
    - docker compose -f docker-compose.yml config --quiet
    - echo "docker-compose.yml valide."

lint:hadolint:
  stage: lint
  extends: .feature-branch-rules
  allow_failure: false
  image:
    name: hadolint/hadolint:v2.12.0-alpine
    entrypoint: [""]
  script:
    - |
      find devops/docker -name 'Dockerfile*' -print0 | while IFS= read -r -d '' file; do
        echo "=== hadolint $file ==="
        hadolint "$file"
      done

lint:yaml:
  stage: lint
  extends: .feature-branch-rules
  allow_failure: false
  image:
    name: cytopia/yamllint:latest
    entrypoint: [""]
  script:
    - yamllint --no-warnings -c .yamllint.yml docker-compose.yml .gitlab-ci.yml devops/ci/gitlab/

lint:shell:
  stage: lint
  extends: .feature-branch-rules
  allow_failure: false
  image: alpine:3.21
  before_script:
    - apk add --no-cache shellcheck
  script:
    - shellcheck devops/ci/scripts/wait-for-url.sh

lint:backend:
  stage: lint
  extends: .node-job
  allow_failure: false
  script:
    - cd backend && pnpm install --frozen-lockfile
    - node --check app.js
    - node --check server.js
    - node -e "require('express'); require('pg'); console.log('backend deps OK')"

lint:eslint:
  stage: lint
  extends: .node-job
  allow_failure: false
  script:
    - cd frontend && pnpm install --frozen-lockfile && pnpm run lint
