stages:
  - build
  - test
  - deploy
 
variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
 
build_job:
  stage: build
  script:
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
 
test_job:
  stage: test
  script:
    - npm run test
  artifacts:
    paths:
      - coverage/
 
deploy_job:
  stage: deploy
  script:
    - ./deploy.sh
